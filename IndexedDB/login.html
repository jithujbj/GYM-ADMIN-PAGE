<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR Fitness Admin Login</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .logo-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 10;
      animation: zoomIn 1.5s ease forwards;
    }

    .logo-container img {
      width: 1000px;
    }

    .login-form {
      background: rgba(0, 0, 0, 0.8);
      padding: 40px;
      border-radius: 10px;
      width: 300px;
      display: none;
      animation: fadeIn 1s ease forwards;
      border: 2px solid #ff3c3c;
      box-shadow: 0 0 20px #ff3c3c, 0 0 40px #ff3c3c inset;
    }

    .login-form h2 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #ffffff;
    }

    input[type="text"],
    input[type="password"] {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background-color: rgba(255, 255, 255, 0.8);
      font-size: 16px;
      color: #000;
    }

    button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background-color: #ff0000;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff3c3c;
    }

    .error {
      color: #ff4d4d;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    @keyframes zoomIn {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="logo-container" id="logoContainer">
    <img src="ARfitnesslogo1.png" alt="AR Fitness Logo">
  </div>

  <form class="login-form" id="loginForm" onsubmit="return validateLogin()">
    <center><h2>AR Fitness Admin Login</h2></center>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <div style="text-align: left; font-size: 14px; color: #fff;">
      <input type="checkbox" id="showPassword" onclick="togglePassword()" style="margin-right: 5px;">
      Show Password
    </div>

    <p class="error" id="error-message">Invalid username or password</p>
    <button type="submit">Login</button>
  </form>

  <script>
    function validateLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('error-message');

      if (username === "Admin" && password === "password") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "home.html";
        return false;
      } else {
        errorMessage.style.display = "block";
        return false;
      }
    }

    function togglePassword() {
      const passwordField = document.getElementById("password");
      const showPasswordCheckbox = document.getElementById("showPassword");
      passwordField.type = showPasswordCheckbox.checked ? "text" : "password";
    }

    // Show login form after logo animation completes
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('logoContainer').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
      }, 1800);
    };
  </script>

</body>
</html>
