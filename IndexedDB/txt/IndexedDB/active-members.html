<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Active Memberships - AR Fitness</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5 url('ARfitnesslogo1.png') no-repeat center center fixed;
      background-size: 1000px;
      background-position: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
    }

    .search-container {
      text-align: left;
      margin-bottom: 20px;
    }

    #searchInput {
      width: 300px;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 14px;
      background: #ff0000;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background-color: #333;
      color: white;
      cursor: pointer;
    }

    #photoModal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
    }

    #photoModal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    .closeBtn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    /* Optional Popup Modal for password entry */
    #passwordModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 8px;
      z-index: 2000;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    #passwordModal input {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #passwordModal button {
      background: #333;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #passwordModal .closeBtn {
      background: red;
      float: right;
      padding: 6px 12px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>

<div class="header">
  <a href="home.html" class="back-btn">Home</a>
  <h1>Active Members</h1>
</div>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="Search by name or phone" onkeyup="renderActiveMembers()" />
</div>


<table id="activeMembersTable">
  <thead>
    <tr>
      <th>Photo</th>
      <th onclick="sortBy('name')">Name</th>
      <th>Phone</th>
      <th onclick="sortBy('plan')">Plan</th>
      <th>Start Date</th>
      <th>End Date</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Full-screen Image Modal -->
<div id="photoModal" onclick="this.style.display='none'">
  <span class="closeBtn" onclick="document.getElementById('photoModal').style.display='none'">&times;</span>
  <img id="modalImage" src="" alt="Full Photo" />
</div>

<!-- Optional Password Modal -->
<div id="passwordModal">
  <h3>Enter Password</h3>
  <input type="password" id="passwordInput" placeholder="Password" />
  <div>
    <button onclick="submitPassword()">Submit</button>
    <button class="closeBtn" onclick="closePasswordModal()">Close</button>
  </div>
</div>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}

let currentSort = { field: '', ascending: true };

// IndexedDB setup
let db;
const request = indexedDB.open("ARFitnessDB", 1);

request.onerror = function () {
  alert("Error opening database");
};

request.onsuccess = function (event) {
  db = event.target.result;
  loadActiveMembers(); // Load data once DB is ready
};

function loadActiveMembers() {
  const transaction = db.transaction("members", "readonly");
  const store = transaction.objectStore("members");
  const request = store.getAll();

  request.onsuccess = function (e) {
    const allMembers = e.target.result;
    const now = new Date();
    const active = allMembers.filter(m => new Date(m.end) >= now);
    renderActiveMembers(active);
  };
}

function renderActiveMembers(members) {
  const tbody = document.querySelector("#activeMembersTable tbody");
  const searchTerm = document.getElementById("searchInput").value.toLowerCase();
  tbody.innerHTML = "";

  let filtered = members.filter(m =>
    m.name.toLowerCase().includes(searchTerm) || m.phone.toLowerCase().includes(searchTerm)
  );

  if (currentSort.field) {
    filtered.sort((a, b) => {
      const valA = a[currentSort.field]?.toLowerCase?.() || '';
      const valB = b[currentSort.field]?.toLowerCase?.() || '';
      return currentSort.ascending ? valA.localeCompare(valB) : valB.localeCompare(valA);
    });
  }

  filtered.forEach(member => {
    const photoCell = member.photo
      ? `<img src="${member.photo}" width="80" style="cursor:pointer; border-radius:5px;" onclick="showFullScreen('${member.photo}')">`
      : "—";

    const row = `<tr>
      <td>${photoCell}</td>
      <td>${member.name}</td>
      <td>${member.phone}</td>
      <td>${member.plan}</td>
      <td>${member.start}</td>
      <td>${member.end}</td>
    </tr>`;

    tbody.innerHTML += row;
  });
}

function sortBy(field) {
  if (currentSort.field === field) {
    currentSort.ascending = !currentSort.ascending;
  } else {
    currentSort.field = field;
    currentSort.ascending = true;
  }
  loadActiveMembers();
}

function showFullScreen(src) {
  document.getElementById("modalImage").src = src;
  document.getElementById("photoModal").style.display = "flex";
}

// Password modal (if used)
function openPasswordModal() {
  document.getElementById('passwordModal').style.display = 'block';
}

function closePasswordModal() {
  document.getElementById('passwordModal').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

function submitPassword() {
  const input = document.getElementById('passwordInput').value;
  if (input === "6361882288") {
    alert("Password correct. You can proceed.");
    closePasswordModal();
  } else {
    alert("Incorrect password.");
  }
}
</script>

</body>
</html>
