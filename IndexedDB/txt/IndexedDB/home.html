<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AR Fitness Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5 url('ARfitnesslogo1.png') no-repeat center center fixed;
      background-size: 1000px;
      background-position: center;
      margin: 0;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { margin: 0; color: #333; }
    .header button {
      padding: 8px 16px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
  background-color: #fefefe;
  margin: 10% auto;
  padding: 20px;
  border: 1px solid #888;
  width: 300px;
  border-radius: 10px;
  text-align: center;
    }
    #backupModal .modal-content button {
  background-color: #555;
  color: white;
  padding: 8px 12px;
  margin: 10px 5px 0 0;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#backupModal .modal-content button:hover {
  background-color: #777;
}
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }
    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }
    .overview-section {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    .overview-button {
      flex: 1;
      background-color: #333;
      color: white;
      padding: 20px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
    }
    .overview-button:hover { background-color: #ff3c3c; }
    .add-member { margin: 20px 0; }
    .add-member button {
      padding: 8px 16px;
      background: #ff3c3c;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .add-form input { display: block; margin: 10px 0; padding: 8px; width: 100%; }
    .add-form button { margin-right: 5px; margin-top: 5px; }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>

<div class="header">
  <h1>Welcome to AR Fitness Dashboard</h1>
  <button onclick="logout()">Logout</button>
</div>

<!-- Notification Bar -->
<div id="notificationBar" style="display:none; background: #ffefc2; padding: 10px; border: 1px solid #ffa500; border-radius: 5px; margin: 20px 0;">
  <h3 style="margin-top:0; color: #d2691e;">Upcoming Expirations:</h3>
  <div id="notifications"></div>
</div>
<!-- Fullscreen Photo Modal -->
<div id="photoModal" onclick="closePhotoModal(event)" style="
  display: none;
  position: fixed;
  z-index: 9999;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
">
  <span style="
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 30px;
    cursor: pointer;
    z-index: 10000;
  " onclick="forceClosePhotoModal(event)">&times;</span>
  <img id="modalPhoto" src="" style="max-width: 90%; max-height: 90%; z-index: 9999;" />
</div>


<div id="recentRenewalsModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeRecentRenewals()">&times;</span>
    <h2>Recent Renewals</h2>
    <div id="recentRenewalsList"></div>
  </div>
</div>

<div class="overview-section">
  <button class="overview-button" onclick="location.href='total-members.html'">
    <div>Total Members</div><div id="totalCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
  <button class="overview-button" onclick="location.href='active-members.html'">
    <div>Active Memberships</div><div id="activeCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
  <button class="overview-button" onclick="location.href='expired-members.html'">
    <div>Expired Memberships</div><div id="expiredCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
</div>

<div class="add-member">
  <button onclick="toggleAddForm()">Add Member</button>
  <input type="file" id="excelUpload" accept=".xlsx" />

  <div id="addForm" class="add-form" style="display:none; margin-top: 20px;">
    <input type="text" id="name" placeholder="Name" required />
    <input type="text" id="phone" placeholder="Phone" required />
    <input type="text" id="plan" placeholder="Plan" required />
    <input type="date" id="start" required />
    <input type="date" id="end" required />
    <div style="margin:10px 0;">
      <button onclick="setPlanDuration(1)">1 Month</button>
      <button onclick="setPlanDuration(3)">3 Months</button>
      <button onclick="setPlanDuration(6)">6 Months</button>
      <button onclick="setPlanDuration(12)">1 Year</button>
    </div>

    <input type="file" id="photo" accept="image/*" capture="environment" style="display:none;" />
    <button type="button" onclick="document.getElementById('photo').click()">Capture Photo</button>
    <span id="photoStatus" style="margin-left:10px;"></span>

    <button onclick="addMember()">Add</button>
  </div>
</div>
<!-- Button to show recent renewals -->
<button onclick="location.href='recent-renewals.html'" style="margin-top: 20px; background: #008CBA; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
  Show Recent Renewals
</button>
<!-- Add this inside the <body> tag where other sections like notifications and add-member are defined -->

<!-- Backup Modal -->
<div id="backupModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="document.getElementById('backupModal').style.display='none'">&times;</span>
    <h2>Backup Options</h2>
    <button id="backupCSVBtn" onclick="backupToCSV()">Backup as CSV</button>
    <button id="uploadCSVBtn" onclick="document.getElementById('csvUploadHidden').click()">Upload CSV</button>
  </div>
</div>

<!-- Backup trigger button -->
<div style="margin: 20px 0;">
  <button onclick="document.getElementById('backupModal').style.display='block'" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
    Backup & Restore
  </button>
  <input type="file" id="csvUploadHidden" accept=".csv" style="display: none;" />
</div>



<div class="overview-section">
  <button class="overview-button" onclick="location.href='plan-1month.html'">
    <div>1 Month</div>
    <div id="oneMonthCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
  <button class="overview-button" onclick="location.href='plan-3months.html'">
    <div>3 Months</div>
    <div id="threeMonthCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
  <button class="overview-button" onclick="location.href='plan-6months.html'">
    <div>6 Months</div>
    <div id="sixMonthCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
  <button class="overview-button" onclick="location.href='plan-12months.html'">
    <div>1 Year</div>
    <div id="oneYearCount" style="font-size: 24px; margin-top: 10px;">0</div>
  </button>
</div>

<div class="overview-section">
  <button class="overview-button" onclick="location.href='trainers.html'">
    <div>Trainers</div>
  </button>
  <button class="overview-button" onclick="location.href='earnings.html'">
    <div>Earnings</div>
  </button>
</div>

<script src="home.js">
  </script>


</body>
</html>
